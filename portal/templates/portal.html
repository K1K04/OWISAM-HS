<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi Gratis — Registro</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%; max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo svg { width: 56px; height: 56px; }
  h1 { font-size: 1.5rem; color: #1a1a2e; text-align: center; margin-bottom: 6px; }
  .subtitle { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 28px; }
  label { display: block; font-size: 0.85rem; color: #444; margin-bottom: 6px; font-weight: 600; }
  input {
    width: 100%; padding: 12px 14px; border: 1.5px solid #ddd;
    border-radius: 8px; font-size: 1rem; transition: border-color .2s;
    margin-bottom: 18px;
  }
  input:focus { outline: none; border-color: #0f3460; }
  .btn {
    width: 100%; padding: 14px; background: #0f3460;
    color: white; border: none; border-radius: 8px;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    transition: background .2s;
  }
  .btn:hover { background: #16213e; }
  .error {
    background: #fee2e2; border: 1px solid #fca5a5;
    color: #b91c1c; padding: 10px 14px; border-radius: 8px;
    margin-bottom: 18px; font-size: 0.875rem;
  }
  .terms { font-size: 0.78rem; color: #888; text-align: center; margin-top: 16px; }
  .divider { border: none; border-top: 1px solid #eee; margin: 24px 0; }
  .info-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; color: #555; font-size: 0.85rem; }
  .info-row svg { flex-shrink: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" stroke="#0f3460" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <h1>WiFi Gratis</h1>
  <p class="subtitle">Regístrate para acceder a internet</p>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/register">
    <label for="name">Nombre completo</label>
    <input type="text" id="name" name="name" placeholder="Tu nombre" required autocomplete="name">

    <label for="email">Correo electrónico</label>
    <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email">

    <button type="submit" class="btn">Conectarme gratis →</button>
  </form>

  <p class="terms">Al registrarte aceptas los <a href="#" style="color:#0f3460">Términos de uso</a> y la <a href="#" style="color:#0f3460">Política de privacidad</a>.</p>

  <hr class="divider">

  <div class="info-row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0f3460" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Velocidad: hasta 10 Mbps · Sin coste
  </div>
  <div class="info-row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0f3460" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Conexión segura · Cifrado WPA3
  </div>
</div>
</body>
</html>
