<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Conectado!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: white; border-radius: 16px;
    padding: 48px 36px; width: 100%; max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4); text-align: center;
  }
  .check { font-size: 4rem; margin-bottom: 16px; }
  h1 { color: #166534; font-size: 1.6rem; margin-bottom: 10px; }
  p { color: #555; font-size: 0.95rem; }
</style>
</head>
<body>
<div class="card">
  <div class="check">✅</div>
  <h1>¡Ya tienes acceso!</h1>
  <p>Tu sesión está activa. Puedes navegar libremente.<br><br>
  <small style="color:#999">Portal cautivo de laboratorio — TFM Ciberseguridad</small></p>
</div>
</body>
</html>
